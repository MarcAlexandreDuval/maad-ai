name: Weekly Blog Post Generator

# Generates 1 blog post per week for maad-ai.com
# Runs Mondays 9:00 EDT (13:00 UTC) — adjust cron to 14:00 UTC after DST ends in November
# Manual trigger available via Actions UI ("Run workflow" button)

on:
  schedule:
    - cron: '0 13 * * 1'  # Mondays 13:00 UTC = 9:00 EDT (8:00 EST in winter)
  workflow_dispatch:

permissions:
  contents: write  # Required to commit + push the generated article

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        working-directory: website
        run: npm install --no-save @anthropic-ai/sdk

      - name: Generate blog post
        id: generate
        working-directory: website
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit and push
        env:
          POST_SLUG: ${{ steps.generate.outputs.slug }}
          POST_TITLE: ${{ steps.generate.outputs.title }}
          POST_CATEGORY: ${{ steps.generate.outputs.category }}
        run: |
          git config user.name "MAAD-AI Blog Bot"
          git config user.email "blog-bot@maad-ai.com"
          git add website/lib/blog.ts website/scripts/blog-topics.json
          if git diff --cached --quiet; then
            echo "Nothing to commit — script may have failed silently"
            exit 1
          fi
          git commit -m "blog: ${POST_SLUG}

          Title: ${POST_TITLE}
          Category: ${POST_CATEGORY}
          Auto-generated by weekly blog bot.
          "
          git push
